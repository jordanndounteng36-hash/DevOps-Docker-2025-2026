services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - taskflow_network

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      BACKEND_PORT: 3001
      REDIS_HOST: cache
      REDIS_PORT: 6379
    depends_on:
      - cache
    restart: on-failure
    networks:
      - taskflow_network

  cache:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - taskflow_network

volumes:
  redis_data:

networks:
  taskflow_network: